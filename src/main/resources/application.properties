spring.application.name=movie-auth-service
server.port=${SERVER_PORT}

# ── PostgreSQL ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Neo4j ─────────────────────────────────────────────────────────────────────
spring.neo4j.uri=${SPRING_NEO4J_URI:bolt://localhost:7687}
spring.neo4j.authentication.username=${SPRING_NEO4J_AUTHENTICATION_USERNAME:neo4j}
spring.neo4j.authentication.password=${SPRING_NEO4J_AUTHENTICATION_PASSWORD:neo4j_password}

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwtSecret=${JWT_SECRET}
app.jwtExpirationMs=${JWT_EXPIRATION_MS}
app.jwtRefreshExpirationMs=${JWT_REFRESH_EXPIRATION_MS}

# ── Google OAuth2 ─────────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${APP_BASE_URL}/login/oauth2/code/google

# ── SendGrid ──────────────────────────────────────────────────────────────────
app.sendgrid.api-key=${SENDGRID_API_KEY}
app.sendgrid.from-email=${SENDGRID_FROM_EMAIL}

# ── App URLs ──────────────────────────────────────────────────────────────────
app.baseUrl=${APP_BASE_URL}
app.oauth2.redirectUri=${OAUTH2_REDIRECT_URI}

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

# ── Video Storage ────────────────────────────────────────────────────────────
app.video.local-root=${VIDEO_LOCAL_ROOT:videos}
app.storage.supabase.base-url=${SUPABASE_STORAGE_BASE_URL:}
