# Docker profile configuration

server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework

# PostgreSQL (service name networking in docker-compose)
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/movie_db}
spring.datasource.username=${DB_USERNAME:movie_user}
spring.datasource.password=${DB_PASSWORD:movie_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Neo4j
spring.neo4j.uri=${SPRING_NEO4J_URI:bolt://neo4j:7687}
spring.neo4j.authentication.username=${SPRING_NEO4J_AUTHENTICATION_USERNAME:neo4j}
spring.neo4j.authentication.password=${SPRING_NEO4J_AUTHENTICATION_PASSWORD:neo4j_password}

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

# JWT
app.jwtSecret=${JWT_SECRET}
app.jwtExpirationMs=${JWT_EXPIRATION_MS:900000}
app.jwtRefreshExpirationMs=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Video storage
app.video.local-root=${VIDEO_LOCAL_ROOT:videos}
app.storage.supabase.base-url=${SUPABASE_STORAGE_BASE_URL:}

# OAuth2 - hardcoded for production domain (overrides application.properties ${APP_BASE_URL})
spring.security.oauth2.client.registration.google.redirect-uri=https://cinek.minhkhoidao.id.vn/login/oauth2/code/google

# Actuator for container health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
