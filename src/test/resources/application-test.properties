server.port=8080

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

app.jwtSecret=test-secret-key-for-testing-only-minimum-length
app.jwtExpirationMs=900000
app.jwtRefreshExpirationMs=604800000

spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile

app.sendgrid.api-key=disabled
app.sendgrid.from-email=noreply@test.com

app.baseUrl=http://localhost:8080
app.oauth2.redirectUri=http://localhost:8080/oauth2/callback

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.neo4j.uri=bolt://localhost:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=test
