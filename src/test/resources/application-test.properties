server.port=8080

# ── H2 in-memory database ──────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ── Disable Flyway (H2 uses ddl-auto instead) ──────────────────────────────
spring.flyway.enabled=false

# ── Disable Neo4j and Redis auto-configuration ─────────────────────────────
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.neo4j.Neo4jDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.neo4j.Neo4jAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# ── JWT ────────────────────────────────────────────────────────────────────
app.jwtSecret=test-secret-key-for-testing-only-minimum-length
app.jwtExpirationMs=900000
app.jwtRefreshExpirationMs=604800000

# ── OAuth2 (stub values — no real auth in tests) ───────────────────────────
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile

# ── SendGrid (disabled in tests) ───────────────────────────────────────────
app.sendgrid.api-key=disabled
app.sendgrid.from-email=noreply@test.com

# ── Cache: use simple in-memory (avoids Redis cache auto-config) ───────────
spring.cache.type=none

# ── App URLs ───────────────────────────────────────────────────────────────
app.baseUrl=http://localhost:8080
app.oauth2.redirectUri=http://localhost:8080/oauth2/callback
